<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* MAIN SPLIT */
.container {
  display: flex;
  height: 100vh;
}

/* LEFT SIDE */
.left {
  width: 50%;
  background: #dfe1e6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* LOGO */
.logo {
  margin-bottom: 20px;
}

.logo img {
  width: 160px;
}

/* LOGIN BOX */
.login-box {
  background: white;
  padding: 20px;
  width: 320px;
  border-radius: 4px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.login-box label {
  font-size: 13px;
  color: #555;
}

.login-box input {
  width: 100%;
  padding: 8px;
  margin: 6px 0 12px;
  border: 1px solid #ccc;
  border-radius: 3px;
}

.login-box button {
  width: 100%;
  padding: 10px;
  background: #2c5fa6;
  color: white;
  border: none;
  border-radius: 3px;
}

.footer {
  position: absolute;
  bottom: 10px;
  font-size: 12px;
}

/* RIGHT SIDE */
.right {
  width: 50%;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  background: white;
}

.header img {
  width: 300px;
}

.header p {
  color: #2c5fa6;
}

/* NAV */
.nav {
  background: #2c5fa6;
  color: white;
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 10px;
  font-size: 13px;
}

/* HERO */
.hero {
  flex: 1;
  position: relative;
  background: url('https://images.unsplash.com/photo-1560185007-cde436f6a4d0?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
}

/* HERO TEXT */
.hero-text {
  position: absolute;
  top: 45%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 32px;
  font-weight: bold;
}

/* CTA */
.cta {
  background: #2c5fa6;
  color: white;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cta button {
  background: white;
  color: #2c5fa6;
  border: none;
  padding: 10px 20px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

  <!-- LEFT LOGIN -->
  <div class="left">

    <div class="logo">
      <!-- 🔥 Replace with your logo -->
      <img src="https://dummyimage.com/300x100/ffffff/000000&text=RISKPRO">
    </div>

    <div class="login-box">
      <label>Username</label>
      <input type="text">

      <label>Password</label>
      <input type="password">

      <button>Log In</button>

      <p><input type="checkbox"> Remember me</p>
      <a href="#">Forgot Your Password?</a>
    </div>

    <div class="footer">
      © 2026 Salesforce, Inc.
    </div>

  </div>

  <!-- RIGHT UI -->
  <div class="right">

    <div class="header">
      <img src="https://dummyimage.com/500x120/ffffff/000000&text=RISKPRO+HOME+LENDING">
      <p>Give us a call (248) 537-9200</p>
    </div>

    <div class="nav">
      <span>RATES</span>
      <span>PURCHASE</span>
      <span>REFINANCE</span>
      <span>REAL ESTATE</span>
      <span>RESOURCES</span>
      <span>COMPANY</span>
      <span>APPLY NOW</span>
    </div>

    <div class="hero">
      <div class="hero-text">
        Your Mortgage, Simplified
      </div>
    </div>

    <div class="cta">
      <p>If you have mortgage related questions, we have the answers.</p>
      <button>ASK AN EXPERT</button>
    </div>

  </div>

</div>

</body>
</html>
